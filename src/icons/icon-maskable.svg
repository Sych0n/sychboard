<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1428"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="letterm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6eb8ff"/>
      <stop offset="0.5" stop-color="#3d8ef0"/>
      <stop offset="1" stop-color="#1a5fc8"/>
    </linearGradient>
    <filter id="glowm">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Maskable: full bleed, content within central 80% safe zone -->
  <rect width="512" height="512" fill="url(#bgm)"/>
  <line x1="0" y1="170" x2="512" y2="170" stroke="#3d8ef0" stroke-opacity="0.07" stroke-width="1.5"/>
  <line x1="0" y1="342" x2="512" y2="342" stroke="#3d8ef0" stroke-opacity="0.07" stroke-width="1.5"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#3d8ef0" stroke-opacity="0.07" stroke-width="1.5"/>
  <line x1="342" y1="0" x2="342" y2="512" stroke="#3d8ef0" stroke-opacity="0.07" stroke-width="1.5"/>
  <text x="256" y="352" font-family="'Segoe UI',Arial,sans-serif" font-size="300" font-weight="800"
        fill="url(#letterm)" text-anchor="middle" letter-spacing="-8" filter="url(#glowm)">S</text>
</svg>
